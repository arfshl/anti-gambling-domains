name: Mirror to Codeberg

on:
  workflow_run:
    workflows:
      - "Remove dead domains"
      - "Convert raw URLs"
    types:
      - completed
jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push mirror
        run: |
          git remote add codeberg https://arfshl:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/arfshl/anti-gambling-domains.git
          git push --mirror codeberg
